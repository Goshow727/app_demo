name: videoGeneration

services:
    mysql:
        image: mysql:8.4.8
        container_name: ai-mysql
        ports:
            - "3306:3306"
        environment:
            TZ: Asia/Shanghai # 指定时区
            MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
            MYSQL_DATABASE: ${MYSQL_DATABASE}
        volumes:
            - mysql-data:/var/lib/mysql
        networks:
            - app-network

    redis:
        image: redis:latest
        container_name: ai-redis
        ports:
            - "6379:6379"
        volumes:
            - redis-data:/data

        command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes

        environment:
            REDIS_PASSWORD: ${REDIS_PASSWORD}

        # command: redis-server --appendonly yes

        networks:
            - app-network

    nginx:
        image: nginx:latest
        container_name: app-nginx
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./nginx/conf.d:/etc/nginx/conf.d
            - ./nginx/html:/usr/share/nginx/html
            - ./nginx/logs:/var/log/nginx
            - ./nginx/ssl:/etc/nginx/ssl
        depends_on:
            - mysql
        networks:
            - app-network

    #后台管理
    node-manage:
        build: ./apps/manage # 指向包含 Dockerfile 的目录
        container_name: manage

        volumes:
            - ./apps/manage/static:/root
            - ./apps/manage/public:/app/manage/public

        depends_on:
            - mysql
            - nginx
        environment:
            PORT: 8088
            # mysql
            DB_HOST: mysql
            DB_USER: root
            DB_PASSWORD: ${MYSQL_PASSWORD} # 与 mysql 中的密码一致
            DB_NAME: ${MYSQL_DATABASE}
            #redis
            REDIS_HOST: redis
            REDIS_PASSWORD: ${REDIS_PASSWORD}
        networks:
            - app-network
    # #用户模块
    # micro-app-user:
    #     build: ./apps/micro/user # 指向包含 Dockerfile 的目录
    #     container_name: micro-user
    #     depends_on:
    #         - mysql
    #         - redis
    #         - node-manage
    #     volumes:
    #         - ./apps/micro/root:/root
    #         - ./apps/micro/user/public:/app/public
    #     environment:
    #         PORT: 8000
    #         # mysql
    #         DB_HOST: mysql
    #         DB_USER: root
    #         DB_PASSWORD: ${MYSQL_PASSWORD} # 与 mysql 中的密码一致
    #         DB_NAME: ${MYSQL_DATABASE}
    #         #redis
    #         REDIS_HOST: redis
    #         REDIS_PASSWORD: ${REDIS_PASSWORD}

    #     networks:
    #         - app-network

volumes:
    mysql-data:
        driver: local
        driver_opts:
            type: none
            o: bind
            device: ./mysql
    redis-data:
        driver: local
        driver_opts:
            type: none
            o: bind
            device: ./redis
    apps-static:
        driver: local
        driver_opts:
            type: none
            o: bind
            device: ./apps

networks:
    app-network:
        driver: bridge
